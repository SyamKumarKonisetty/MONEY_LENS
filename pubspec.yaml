name: money_lens
description: "MoneyLens — Premium Personal Finance Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Database (Phase 2 activation — foundation configured here)
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29

  # Charts
  fl_chart: ^0.70.0

  # Typography
  google_fonts: ^6.2.1

  # Persistence
  shared_preferences: ^2.3.5

  # Formatting
  intl: ^0.19.0
  pdf: ^3.12.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5

  # SMS Permission
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation (activated in Phase 2 when Drift tables are added)
  build_runner: ^2.4.14
  drift_dev: ^2.26.1

flutter:
  uses-material-design: true
